<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/item_style.css" />
    <title>Item Page</title>
  </head>
  <body>
    <header class="header">
      <h1 class="title">Store</h1>
      <h2 class="item-name">Item Name</h2>

      <nav class="navigation">
        <ul class="nav-list">
          <li class="nav-item"><a href="#" class="nav-link">Cart</a></li>
          <li class="nav-item"><a href="#" class="nav-link">Sign out</a></li>
          <li class="nav-item">
            <a href="#" class="nav-link">User Name</a>
          </li>
        </ul>
      </nav>
    </header>
    <section class="item-details">
      <div class="item-info">
        <img
          src="../img/item_photo.jpg"
          alt="Item Image"
          width="300"
          height="300"
        />
        <div class="item-purchase">
          <h2 class="item-price">Price: $XX.XX</h2>
          <div class="quantity-input">
            <label for="quantity">Quantity:</label>
            <input
              type="number"
              id="quantity"
              class="quantity"
              placeholder="1...99"
              name="quantity"
              min="1"
              max="99"
            />
          </div>

          <button type="button" class="add-to-cart">Buy now</button>
        </div>
      </div>
      <p class="item-description">Description of the item.</p>
    </section>
    <footer>
      <p>&copy; 2026 STORE. All rights reserved.</p>
    </footer>
  </body>
</html>
