    <link rel="stylesheet" href="../css/item_style.css" />
    <title>Item Page</title>
  </head>
  <body>
    <header class="header">
      <h1 class="title">Store</h1>
      <h2 class="item-name">Item Name</h2>

      <nav class="navigation">

          <li class="nav-item"><a href="#">Cart</a></li>
