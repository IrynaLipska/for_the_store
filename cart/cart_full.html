<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/cart_style.css" />
    <title>Empty Cart</title>
  </head>
  <body>
    <header class="header">
      <h2 class="store-title">Store</h2>

      <nav class="navigation">
        <ul class="nav-list">
          <li class="nav-item"><a href="#" class="nav-link">Cart</a></li>
          <li class="nav-item"><a href="#" class="nav-link">Sign out</a></li>
          <li class="nav-item">
            <a href="#" class="nav-link">User Name</a>
          </li>
        </ul>
      </nav>
    </header>
    <section>
      <h1 class="title">Your Cart</h1>
      <div class="cart-items">
        <div class="cart_item-img">
          <img
            src="../img/cart_item_photo.jpg"
            alt="Cart Item Image"
            width="100"
            height="100"
          />
          <div class="cart_item-info">
            <h3 class="item-name">Item Name</h3>
            <p class="item-description">Item description goes here.</p>
            <p class="item-price">$19.99</p>
          </div>
          <div class="cart_item-actions">
            <button class="remove-item">Remove</button>
            <button class="update-quantity">Update Quantity</button>
          </div>
        </div>
      </div>
      <div class="cart-summary">
        <h2 class="summary-title">Cart Summary</h2>
        <p class="total-items">Total Items: 1</p>
        <p class="total-price">Total Price: $19.99</p>
        <button class="checkout-button">Proceed to Checkout</button>
      </div>
    </section>
    <footer>
      <p>&copy; 2026 STORE. All rights reserved.</p>
    </footer>
  </body>
</html>
